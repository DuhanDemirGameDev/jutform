<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{form_name}}</title>
  <style>
    body {
      font-family: DejaVu Sans, sans-serif;
      font-size: 12px;
      color: #1f2937;
      margin: 24px;
    }
    .meta {
      margin-bottom: 16px;
      color: #4b5563;
    }
    .rows {
      border: 1px solid #d1d5db;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>{{form_name}}</h1>
  <div class="meta">Generated at: {{generated_at}}</div>
  <div class="meta">Submission count: {{submission_count}}</div>
  <div class="rows">{{rows}}</div>
</body>
</html>
